services:
  redis:
    image: redis:alpine
    container_name: mcp-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mcp-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  api-visitor:
    build:
      context: .
      dockerfile: C:\Users\deivi\OneDrive\Desktop\VisitorService\VisitorService.Interfaces/Dockerfile
    container_name: api-visitor-service
    ports:
      - "5002:8080"
    depends_on:
      - rabbitmq

  mcp-server:
    build:
      context: C:\Users\deivi\OneDrive\Desktop\VisitorService\MCP\McpServer.VisitorService
      dockerfile: Dockerfile
    container_name: mcp-server-visitor
    ports:
      - "5000:8080"
    depends_on:
      - redis

  mcp-client:
    build:
      context: C:\Users\deivi\OneDrive\Desktop\VisitorService\MCP\McpCliente.VisitorService
      dockerfile: Dockerfile
    container_name: mcp-client-visitor
    ports:
      - "5001:8080"
    depends_on:
      - mcp-server